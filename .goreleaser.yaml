version: 2

env:
  - BACKREST_BUILD_VERSION={{.Version}}

before:
  hooks:
    - go mod tidy
    - pnpm --prefix webui install
    - sh -c "GOOS=linux BACKREST_BUILD_VERSION={{.Version}} go generate ./..."
    - sh -c "GOOS=windows BACKREST_BUILD_VERSION={{.Version}} go generate ./..."

builds:
  - id: other
    main: ./cmd/backrest
    binary: backrest
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
  - id: linux
    main: ./cmd/backrest
    binary: backrest
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - 6
      - 7
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
  - id: docker-entrypoint
    main: ./cmd/docker-entrypoint
    binary: docker-entrypoint
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - 6
      - 7
    ldflags:
      - -s -w
  - id: windows
    main: ./cmd/backrest
    binary: backrest
    env:
      - CGO_ENABLED=1
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -H windowsgui

archives:
  - formats: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - install.sh
      - uninstall.sh
      - LICENSE
      - README.md
      - CHANGELOG.md
    allow_different_binary_count: true

dockers_v2:
  - id: alpine
    images:
      - "garethgeorge/backrest"
      - "ghcr.io/garethgeorge/backrest"
    tags:
      - latest
      - latest-alpine
      - v{{ .Major }}
      - v{{ .Major }}.{{ .Minor }}
      - "{{ .Tag }}"
      - "{{ .Tag }}-alpine"
    dockerfile: Dockerfile.alpine
    flags:
      - "--pull"
    ids:
      - linux
      - docker-entrypoint
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/armv6
      - linux/armv7
      - linux/386

  - id: scratch
    images:
      - garethgeorge/backrest
      - ghcr.io/garethgeorge/backrest
    tags:
      - scratch
      - v{{ .Major }}-scratch
      - v{{ .Major }}.{{ .Minor }}-scratch
      - "{{ .Tag }}-scratch"
    dockerfile: Dockerfile.scratch
    flags:
      - "--pull"
    ids:
      - linux
      - docker-entrypoint
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/armv6
      - linux/armv7
      - linux/386

brews:
  - name: backrest
    homepage: https://github.com/garethgeorge/backrest
    description: "Backrest is a web UI and orchestrator for restic backup."

    url_template: "https://github.com/garethgeorge/backrest/releases/download/{{ .Tag }}/{{ .ArtifactName }}"

    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

    repository:
      owner: garethgeorge
      name: homebrew-backrest-tap
      branch: main
      token: "{{ .Env.HOMEBREW_GITHUB_TOKEN }}"

    service: |
      run opt_bin/"backrest"
      error_log_path var/"log/backrest.log"
      log_path var/"log/backrest.log"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: garethgeorge
    name: backrest
